        <p>谢尔宾斯基六边形</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt  </span><br><span class="line"><span class="keyword">import</span> random  </span><br><span class="line"></span><br><span class="line">a = [<span class="number">0</span>, <span class="number">0</span>, <span class="number">2</span>, <span class="number">0</span>, <span class="number">3</span>, <span class="number">1.732</span>, <span class="number">2</span>, <span class="number">3.464</span>, <span class="number">0</span>, <span class="number">3.464</span>, -<span class="number">1</span>, <span class="number">1.732</span>]  </span><br><span class="line">x = <span class="number">0</span>  </span><br><span class="line">y = <span class="number">0</span>  </span><br><span class="line">x1 = []  </span><br><span class="line">y1 = []  </span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="number">100000</span>):  </span><br><span class="line">    b = random.randint(<span class="number">1</span>, <span class="number">6</span>)  </span><br><span class="line">    x0 = (x + <span class="number">2</span> * a[<span class="number">2</span> * b - <span class="number">2</span>]) / <span class="number">3</span>  </span><br><span class="line">    y0 = (y + <span class="number">2</span> * a[<span class="number">2</span> * b - <span class="number">1</span>]) / <span class="number">3</span>  </span><br><span class="line">    x1.append(x0)  </span><br><span class="line">    y1.append(y0)  </span><br><span class="line">    x, y = x0, y0  </span><br><span class="line">plt.scatter(x1, y1, marker=<span class="string">&#x27;o&#x27;</span>, s=<span class="number">0.1</span>)  </span><br><span class="line">plt.show()</span><br></pre></td></tr></table></figure>
